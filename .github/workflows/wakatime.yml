name: Waka Readme

# Impede execuções duplicadas simultâneas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Remove o aviso de depreciação do Node.js nos logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: "us-east-1" # Altere para a região onde configurou seu SES (ex: us-east-1, sa-east-1)

on:
  schedule:
    # Roda diariamente às 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout usando seu PAT para garantir permissão de escrita
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WAKATIME_TOKEN }}

      - name: Rodar WakaStats
        id: waka_job
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKATIME_TOKEN }}
          SHOW_LINES_OF_CODE: "true"
          SHOW_SHORT_INFO: "false"
          SHOW_PROFILE_VIEWS: "false"
          SHOW_TOTAL_CODE_TIME: "false"
          COMMIT_MESSAGE: "Updated WakaTime stats [skip ci]"

      # Configura as credenciais AWS uma única vez para os passos seguintes
      - name: Configure AWS credentials
        if: always() # Garante que roda mesmo se o WakaStats falhar, para podermos enviar o e-mail de erro
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Notificar Sucesso (AWS SES)
        if: success() && steps.waka_job.outcome == 'success' && github.event_name != 'push'
        run: |
          NOW=$(date +'%d/%m/%Y %H:%M')
          
          # Escapa o HTML para o JSON da AWS CLI
          HTML_CONTENT="<h3>✔️ README Atualizado!</h3><p>Suas estatísticas foram sincronizadas com sucesso.</p><p>📅 <strong>Data:</strong> $NOW</p><p>🔗 <a href=\"https://wakatime.com/dashboard\">Acessar Dashboard</a></p>"
          
          aws ses send-email \
            --from "Nemik Notify <notify@nemik.top>" \
            --destination "ToAddresses=ser4ph4@proton.me" \
            --message "Subject={Data=🚀 WakaTime: Perfil Atualizado!,Charset=UTF-8},Body={Html={Data=$HTML_CONTENT,Charset=UTF-8}}"

      - name: Notificar Falha (AWS SES)
        if: failure()
        run: |
          HTML_CONTENT="<h3>❌ Erro na Atualização</h3><p>O workflow do WakaTime falhou no repositório Ser4ph4.</p><p>Verifique os logs no GitHub Actions para identificar o problema (pode ser um token expirado).</p><p>🔗 <a href=\"https://github.com/Ser4ph4/Ser4ph4/actions\">Ver Logs de Execução</a></p>"
          
          aws ses send-email \
            --from "Nemik Notify <notify@nemik.top>" \
            --destination "ToAddresses=ser4ph4@proton.me" \
            --message "Subject={Data=⚠️ ALERTA: Falha no Waka Readme,Charset=UTF-8},Body={Html={Data=$HTML_CONTENT,Charset=UTF-8}}"
