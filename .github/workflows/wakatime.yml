name: Waka Readme

# Impede execuções duplicadas simultâneas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Remove o aviso de depreciação do Node.js nos logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Roda diariamente às 18:30 UTC
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout usando seu PAT para garantir permissão de escrita
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WAKATIME_TOKEN }}

      # Executa a geração das métricas do Wakatime
      - name: Rodar WakaStats
        id: waka_job
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKATIME_TOKEN }}
          SHOW_LINES_OF_CODE: "true"
          SHOW_SHORT_INFO: "false"
          SHOW_PROFILE_VIEWS: "false"
          SHOW_TOTAL_CODE_TIME: "false"
          COMMIT_MESSAGE: "Updated WakaTime stats [skip ci]"

      # Notificação de Sucesso consumindo a API Rest v3 da Brevo
      - name: Notificar Sucesso (Brevo)
        if: success() && steps.waka_job.outcome == 'success' && github.event_name != 'push'
        run: |
          NOW=$(date +'%d/%m/%Y %H:%M')
          HTML_CONTENT="<h3>✔️ README Atualizado!</h3><p>Suas estatísticas foram sincronizadas com sucesso.</p><p>📅 <strong>Data:</strong> $NOW</p><p>🔗 <a href=\"https://wakatime.com/dashboard\">Acessar Dashboard</a></p>"

          curl -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
            -H "content-type: application/json" \
            -d @- <<EOF
          {
            "sender": { "name": "Nemik Notify", "email": "notify@nemik.top" },
            "to": [ { "email": "ser4ph4@proton.me" } ],
            "subject": "🚀 WakaTime: Perfil Atualizado!",
            "htmlContent": $(echo "$HTML_CONTENT" | jq -R .)
          }
          EOF

      # Notificação de Falha consumindo a API Rest v3 da Brevo
      - name: Notificar Falha (Brevo)
        if: failure()
        run: |
          HTML_CONTENT="<h3>❌ Erro na Atualização</h3><p>O workflow do WakaTime falhou no repositório Ser4ph4.</p><p>Verifique os logs no GitHub Actions para identificar o problema (pode ser um token expirado).</p><p>🔗 <a href=\"https://github.com/Ser4ph4/Ser4ph4/actions\">Ver Logs de Execução</a></p>"

          curl -X POST https://api.brevo.com/v3/smtp/email \
            -H "api-key: ${{ secrets.BREVO_API_KEY }}" \
            -H "content-type: application/json" \
            -d @- <<EOF
          {
            "sender": { "name": "Nemik Notify", "email": "notify@nemik.top" },
            "to": [ { "email": "ser4ph4@proton.me" } ],
            "subject": "⚠️ ALERTA: Falha no Waka Readme",
            "htmlContent": $(echo "$HTML_CONTENT" | jq -R .)
          }
          EOF
