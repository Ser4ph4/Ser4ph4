name: Waka Readme

# Impede execuções duplicadas simultâneas
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Remove o aviso de depreciação do Node.js nos logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Roda diariamente às 18:30 UTC
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Checkout usando seu PAT para garantir permissão de escrita
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WAKATIME_TOKEN }}

      - name: Rodar WakaStats
        id: waka_job
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.WAKATIME_TOKEN }}
          SHOW_LINES_OF_CODE: "true"
          SHOW_SHORT_INFO: "false"
          SHOW_PROFILE_VIEWS: "false"
          SHOW_TOTAL_CODE_TIME: "false"
          COMMIT_MESSAGE: "Updated WakaTime stats [skip ci]"

      - name: Notificar Sucesso (Resend)
        if: success() && steps.waka_job.outcome == 'success' && github.event_name != 'push'
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          NOW=$(date +'%d/%m/%Y %H:%M')
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "notify@nemik.top",
              "to": "ser4ph4@proton.me",
              "subject": "🚀 WakaTime: Perfil Atualizado!",
              "html": "<h3>✔️ README Atualizado!</h3><p>Suas estatísticas foram sincronizadas com sucesso.</p><p>📅 <strong>Data:</strong> '"$NOW"'</p><p>🔗 <a href=\"https://wakatime.com/dashboard\">Acessar Dashboard</a></p>"
            }'

      - name: Notificar Falha (Resend)
        if: failure()
        env:
          RESEND_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "notify@nemik.top",
              "to": "ser4ph4@proton.me",
              "subject": "⚠️ ALERTA: Falha no Waka Readme",
              "html": "<h3>❌ Erro na Atualização</h3><p>O workflow do WakaTime falhou no repositório Ser4ph4.</p><p>Verifique os logs no GitHub Actions para identificar o problema (pode ser um token expirado).</p><p>🔗 <a href=\"https://github.com/Ser4ph4/Ser4ph4/actions\">Ver Logs de Execução</a></p>"
            }'
